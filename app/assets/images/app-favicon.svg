<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="f-gold-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#F5D97A"/>
      <stop offset="45%"  stop-color="#C9973A"/>
      <stop offset="100%" stop-color="#E8B84B"/>
    </linearGradient>
    <linearGradient id="f-gold-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#B87333"/>
    </linearGradient>
    <linearGradient id="f-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <filter id="f-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 背景 -->
  <rect width="64" height="64" rx="14" fill="url(#f-bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="13"
        stroke="url(#f-gold-light)" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>
  <!-- 天平主柱 -->
  <circle cx="32" cy="16" r="2.2" fill="url(#f-gold-main)" filter="url(#f-glow)"/>
  <rect x="31.1" y="15" width="1.8" height="22" rx="0.9" fill="url(#f-gold-main)"/>
  <rect x="22" y="37" width="20" height="2.2" rx="1.1" fill="url(#f-gold-main)"/>
  <rect x="29.5" y="39.2" width="5" height="1.6" rx="0.8" fill="url(#f-gold-main)" opacity="0.8"/>
  <!-- 横梁 -->
  <rect x="16" y="19.5" width="32" height="1.6" rx="0.8" fill="url(#f-gold-main)"/>
  <!-- 左秤盘 -->
  <line x1="19" y1="21" x2="19" y2="29" stroke="url(#f-gold-light)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M13.5 29 Q19 31.5 24.5 29" stroke="url(#f-gold-main)" stroke-width="1.6"
        stroke-linecap="round" fill="none" filter="url(#f-glow)"/>
  <!-- 右秤盘 -->
  <line x1="45" y1="21" x2="45" y2="27" stroke="url(#f-gold-light)" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M39.5 27 Q45 29.5 50.5 27" stroke="url(#f-gold-main)" stroke-width="1.6"
        stroke-linecap="round" fill="none" filter="url(#f-glow)"/>
  <!-- AI 节点 -->
  <circle cx="22" cy="47" r="2"   fill="url(#f-gold-main)" opacity="0.9" filter="url(#f-glow)"/>
  <circle cx="32" cy="44" r="2.4" fill="url(#f-gold-main)" filter="url(#f-glow)"/>
  <circle cx="42" cy="47" r="2"   fill="url(#f-gold-main)" opacity="0.9" filter="url(#f-glow)"/>
  <line x1="23.7" y1="46.2" x2="30"   y2="44.6" stroke="url(#f-gold-light)" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="34"   y1="44.6" x2="40.3" y2="46.2" stroke="url(#f-gold-light)" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <circle cx="32" cy="41" r="1" fill="#FDE68A" opacity="0.6"/>
  <line x1="32" y1="41.8" x2="32" y2="43.8" stroke="#FDE68A" stroke-width="0.8" opacity="0.5"/>
</svg>
